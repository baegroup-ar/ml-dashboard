    <rect x="30" y="16" width="15" height="50" rx="7.5"/>
    <rect x="70" y="46" width="15" height="44" rx="7.5"/>
    <circle cx="54" cy="62" r="28"/>
  </g>
  <!-- contador navy de la "a" -->
  <circle cx="64" cy="60" r="6" fill="#16204A"/>
  <!-- ojo: disco blanco + anillo teal + pupila navy -->
  <circle cx="44" cy="64" r="13" fill="#ffffff"/>
  <circle cx="44" cy="64" r="7" fill="none" stroke="#25E5AE" stroke-width="4.2"/>
  <circle cx="44" cy="64" r="3.6" fill="#16204A"/>
</svg>
