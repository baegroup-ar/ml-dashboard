<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel ML — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .logo {
      width: 48px;
      height: 48px;
      background: #FFE600;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 24px;
    }
    h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 6px; }
    p { font-size: 14px; color: #666; margin-bottom: 1.75rem; line-height: 1.5; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 20px;
      background: #FFE600;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      color: #111;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #f0d800; }
    .footer { margin-top: 1.5rem; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛒</div>
    <h1>Panel de ventas</h1>
    <p>Conectá tu cuenta de MercadoLibre para ver tus métricas y ganancias en tiempo real.</p>
    <a href="/login" class="btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="10" fill="#3483FA"/>
        <text x="10" y="14.5" text-anchor="middle" fill="white" font-size="11" font-family="Inter" font-weight="600">ML</text>
      </svg>
      Conectar con MercadoLibre
    </a>
    <p class="footer">Solo se solicitan permisos de lectura de tus ventas.</p>
  </div>
</body>
</html>
